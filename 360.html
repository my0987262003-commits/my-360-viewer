<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 360 終極工具 - 張阿旗 Study Knowledge</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* 拖放提示遮罩 */
        #drop-zone {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none; align-items: center; justify-content: center;
            color: #00ff96; font-size: 28px; border: 5px dashed #00ff96;
            z-index: 100; pointer-events: none; font-weight: bold;
        }

        #ui {
            position: fixed; top: 20px; right: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 10px;
            width: 220px;
        }

        /* 🏆 放在選單內的作者連結按鈕樣式 */
        .author-btn {
            padding: 12px 20px;
            background: rgba(255, 0, 0, 0.2) !important; /* YouTube 紅色調 */
            backdrop-filter: blur(15px);
            color: #fff; border: 1px solid rgba(255, 100, 100, 0.5) !important;
            border-radius: 10px; cursor: pointer;
            font-size: 14px; transition: 0.3s;
            text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2);
        }
        .author-btn:hover {
            background: rgba(255, 0, 0, 0.4) !important;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4);
        }
        .author-btn b { color: #fff; margin-left: 5px; text-decoration: underline; }

        button {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            color: #fff; border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px; cursor: pointer;
            font-size: 14px; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }
        button:hover { background: rgba(255, 255, 255, 0.3); transform: translateY(-2px); }
        
        .file-label {
            padding: 5px 10px; color: #888; font-size: 11px; text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1); margin-top: 5px;
        }
        #file { display: none; }
        .btn-special { background: rgba(0, 255, 150, 0.15); border-color: rgba(0, 255, 150, 0.4); }
    </style>
</head>
<body>

<div id="drop-zone">📥 鬆開滑鼠載入全景圖</div>

<div id="ui">
    <a class="author-btn" href="https://www.youtube.com/@張阿旗StudyKnowledge" target="_blank">
        📺 <span>張阿旗 Study Knowledge</span>
    </a>

    <button onclick="snap()">📷 一般截圖</button>
    <button class="btn-special" onclick="snapFourGrid()">🖼️ 四宮格截圖 (2*2)</button>
    <button onclick="resetView()">🏠 重置視角</button>
    
    <label class="file-label">支援直接拖放圖片檔案</label>
    <button onclick="document.getElementById('file').click()">📤 選擇全景圖檔案</button>
    <input type="file" id="file" accept="image/*">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
    let scene = new THREE.Scene();
    let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    let renderer = new THREE.WebGLRenderer({ 
        antialias: true, 
        preserveDrawingBuffer: true,
        alpha: true 
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    camera.position.set(0, 0, 0.1);

    let mesh;
    function loadTexture(url) {
        const loader = new THREE.TextureLoader();
        loader.setCrossOrigin('anonymous'); 
        loader.load(url, (texture) => {
            if (mesh) scene.remove(mesh);
            const geometry = new THREE.SphereGeometry(500, 60, 40);
            geometry.scale(-1, 1, 1); 
            const material = new THREE.MeshBasicMaterial({ map: texture });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
        }, undefined, (err) => alert("載入失敗"));
    }

    loadTexture("https://threejs.org/examples/textures/2294472375_24a3b8ef46_o.jpg");

    // --- 檔案處理 ---
    const dropZone = document.getElementById('drop-zone');
    function handleFile(file) {
        if (file && file.type.startsWith('image/')) {
            const blobURL = URL.createObjectURL(file);
            loadTexture(blobURL);
        }
    }
    document.getElementById("file").onchange = e => handleFile(e.target.files[0]);
    window.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.display = 'flex'; });
    window.addEventListener('dragleave', e => { if (e.relatedTarget === null) dropZone.style.display = 'none'; });
    window.addEventListener('drop', e => { e.preventDefault(); dropZone.style.display = 'none'; handleFile(e.dataTransfer.files[0]); });

    // --- 相機控制 ---
    let isDown = false, lon = 0, lat = 0;
    document.addEventListener("mousedown", () => isDown = true);
    document.addEventListener("mouseup", () => isDown = false);
    document.addEventListener("mousemove", (e) => {
        if (!isDown) return;
        lon += e.movementX * 0.15;
        lat -= e.movementY * 0.15;
    });
    document.addEventListener("wheel", (e) => {
        camera.fov += e.deltaY * 0.05;
        camera.fov = Math.max(10, Math.min(100, camera.fov));
        camera.updateProjectionMatrix();
    }, { passive: false });

    function resetView() { lon = 0; lat = 0; camera.fov = 75; camera.updateProjectionMatrix(); }

    function updateCamera() {
        lat = Math.max(-85, Math.min(85, lat));
        const phi = THREE.MathUtils.degToRad(90 - lat);
        const theta = THREE.MathUtils.degToRad(lon);
        camera.lookAt(
            500 * Math.sin(phi) * Math.cos(theta),
            500 * Math.cos(phi),
            500 * Math.sin(phi) * Math.sin(theta)
        );
    }

    function animate() {
        requestAnimationFrame(animate);
        updateCamera();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- 四宮格截圖 ---
    function snapFourGrid() {
        const sSize = 1024;
        const finalCanvas = document.createElement("canvas");
        finalCanvas.width = sSize * 2;
        finalCanvas.height = sSize * 2;
        const ctx = finalCanvas.getContext("2d");

        const oldLon = lon, oldLat = lat;

        // 截圖前隱藏 UI
        document.getElementById('ui').style.display = 'none';

        renderer.setSize(sSize, sSize);
        camera.aspect = 1;
        camera.updateProjectionMatrix();

        const angles = [
            { l: oldLon,       t: "Front", x: 0, y: 0 },
            { l: oldLon + 180, t: "Back",  x: 1, y: 0 },
            { l: oldLon + 270, t: "Left",  x: 0, y: 1 },
            { l: oldLon + 90,  t: "Right", x: 1, y: 1 }
        ];

        angles.forEach(pos => {
            lon = pos.l; lat = 0;
            updateCamera();
            renderer.render(scene, camera);
            ctx.drawImage(renderer.domElement, pos.x * sSize, pos.y * sSize, sSize, sSize);
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            ctx.font = "bold 40px Arial";
            ctx.fillText(pos.t, pos.x * sSize + 30, pos.y * sSize + 70);
        });

        const link = document.createElement("a");
        link.href = finalCanvas.toDataURL("image/png");
        link.download = `360-Grid-${Date.now()}.png`;
        link.click();

        lon = oldLon; lat = oldLat;
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();

        document.getElementById('ui').style.display = 'flex';
    }

    function snap() {
        renderer.render(scene, camera);
        const link = document.createElement("a");
        link.href = renderer.domElement.toDataURL("image/png");
        link.download = `360-Shot-${Date.now()}.png`;
        link.click();
    }
</script>

</body>
</html>
