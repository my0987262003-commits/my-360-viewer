<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全景工具箱 (截圖終極修正版)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; font-family: -apple-system, sans-serif; }
        #panorama { width: 100%; height: 100vh; }
        .menu {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 12px 20px; border-radius: 8px;
            cursor: pointer; font-size: 14px; text-align: left;
            transition: all 0.2s; min-width: 160px;
        }
        button:hover { background: rgba(255, 255, 255, 0.25); border-color: white; }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <div id="panorama"></div>
    <div class="menu">
        <button onclick="takeScreenshot()">📷 當前視角截圖</button>
        <button onclick="viewer.setPitch(0); viewer.setYaw(0);">🏠 重置視角</button>
        <button onclick="document.getElementById('fileInput').click()">📤 更換圖片</button>
        <input type="file" id="fileInput" accept="image/*">
    </div>
    <script>
        let viewer = null;

        function initPannellum(imageSrc) {
            if (viewer) { viewer.destroy(); }
            viewer = pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": imageSrc,
                "autoLoad": true,
                "showControls": false,
                "crossOrigin": "anonymous",
                // 關鍵修正：保留繪圖緩衝區，防止截圖變黑
                "rendererOptions": { "preserveDrawingBuffer": true }
            });
        }

        // 預設圖片
        initPannellum("https://pannellum.org/images/alma.jpg");

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                initPannellum(event.target.result);
            };
            reader.readAsDataURL(file);
        });

        function takeScreenshot() {
            const canvas = document.querySelector('#panorama canvas');
            if (canvas) {
                // 確保從 Canvas 獲取資料
                const dataURL = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = '360-capture-' + Date.now() + '.png';
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                alert("找不到畫布，請稍後再試");
            }
        }
    </script>
</body>
</html>
