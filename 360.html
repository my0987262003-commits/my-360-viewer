<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 AI 360° 全景瀏覽器</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #panorama { width: 100%; height: 100vh; }
        #controls {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px;
            color: white; text-align: center; backdrop-filter: blur(5px);
        }
        input[type="file"] { margin-top: 10px; cursor: pointer; }
        .hint { font-size: 12px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="controls">
        <div style="font-weight: bold; margin-bottom: 5px;">360° 全景圖預覽器</div>
        <input type="file" id="fileInput" accept="image/*">
        <div class="hint">請上傳你的 2:1 全景圖 (JPG/PNG)</div>
    </div>

    <div id="panorama"></div>

    <script>
        let viewer = null;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const imgData = event.target.result;
                
                // 如果已經有舊的檢視器，先銷毀它
                if (viewer) { viewer.destroy(); }

                // 啟動 Pannellum 渲染
                viewer = pannellum.viewer('panorama', {
                    "type": "equirectangular",
                    "panorama": imgData,
                    "autoLoad": true,
                    "autoRotate": -2, // 自動緩慢旋轉
                    "compass": true
                });

                // 隱藏上傳按鈕部分（點擊螢幕可再次顯示，或是保持顯示）
                // document.getElementById('controls').style.opacity = "0.3"; 
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
