<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全景工具箱</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; font-family: -apple-system, sans-serif; }
        #panorama { width: 100%; height: 100vh; }
        .menu {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 12px 20px; border-radius: 8px;
            cursor: pointer; font-size: 14px; text-align: left;
            transition: all 0.2s; min-width: 160px;
        }
        button:hover { background: rgba(255, 255, 255, 0.25); border-color: white; }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <div id="panorama"></div>
    <div class="menu">
        <button onclick="takeScreenshot()">📷 當前視角截圖</button>
        <button onclick="viewer.setPitch(0); viewer.setYaw(0);">🏠 重置視角</button>
        <button onclick="document.getElementById('fileInput').click()">📤 更換圖片</button>
        <input type="file" id="fileInput" accept="image/*">
    </div>
    <script>
        let viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "https://pannellum.org/images/alma.jpg",
            "autoLoad": true,
            "showControls": false
        });
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                viewer = pannellum.viewer('panorama', {
                    "type": "equirectangular",
                    "panorama": event.target.result,
                    "autoLoad": true,
                    "showControls": false
                });
            };
            reader.readAsDataURL(file);
        });
        function takeScreenshot() {
            const canvas = document.querySelector('#panorama canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = '360-view.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }
        }
    </script>
</body>
</html>
