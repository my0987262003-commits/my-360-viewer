<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全景工具箱 (截圖強制修正版)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #panorama { width: 100%; height: 100vh; }
        .menu {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white; padding: 12px 20px; border-radius: 10px;
            cursor: pointer; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.2s; min-width: 170px;
        }
        button:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.02); }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <div id="panorama"></div>
    <div class="menu">
        <button id="snapBtn">📷 點擊此處截圖</button>
        <button onclick="viewer.setPitch(0); viewer.setYaw(0);">🏠 重置視角</button>
        <button onclick="document.getElementById('fileInput').click()">📤 更換圖片</button>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <script>
        let viewer = null;

        function loadPano(img) {
            if (viewer) viewer.destroy();
            viewer = pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": img,
                "autoLoad": true,
                "showControls": false,
                "crossOrigin": "anonymous"
            });
        }

        loadPano("https://pannellum.org/images/alma.jpg");

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => loadPano(e.target.result);
            reader.readAsDataURL(file);
        });

        // 截圖邏輯修正：直接從渲染循環中抓取
        document.getElementById('snapBtn').addEventListener('click', function() {
            const canvas = document.querySelector('#panorama canvas');
            if (!canvas) return;

            // 強制瀏覽器在下一幀渲染前不要清空內容
            const dataURL = canvas.toDataURL('image/png');
            
            if (dataURL === "data:,") { // 如果抓到空數據
                alert("截圖失敗，請嘗試晃動一下畫面再按一次！");
            } else {
                const link = document.createElement('a');
                link.href = dataURL;
                link.download = `360-shot-${Date.now()}.png`;
                link.click();
            }
        });
    </script>
</body>
</html>
